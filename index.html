<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陈琪 · 个人简历</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .container { max-width: 480px; width: 100%; }
  h1 { text-align: center; font-size: 22px; color: #1a1a1a; margin-bottom: 6px; }
  .sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 28px; }
  .card {
    display: block;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 24px 28px;
    margin-bottom: 14px;
    text-decoration: none;
    color: #1a1a1a;
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }
  .card h2 { font-size: 16px; margin-bottom: 4px; }
  .card p { color: #999; font-size: 12px; }
  .badge {
    display: inline-block;
    background: #e8f0fe;
    color: #1a56db;
    font-size: 11px;
    padding: 1px 10px;
    border-radius: 10px;
    margin-left: 6px;
    vertical-align: middle;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="container">
  <h1>📄 陈琪 · 个人简历</h1>
  <p class="sub">点击查看 / 下载 PDF</p>

  <a class="card" href="陈琪海外销售简历.pdf" target="_blank">
    <h2>🇨🇳 中文简历 <span class="badge">PDF</span></h2>
    <p>陈琪海外销售简历.pdf</p>
  </a>

  <a class="card" href="Niki_Resume_EN.pdf" target="_blank">
    <h2>🇺🇸 English Resume <span class="badge">PDF</span></h2>
    <p>Niki_Resume_EN.pdf</p>
  </a>
</div>
</body>
</html>
